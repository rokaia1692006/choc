<div class="shop">

  <div class="header">
    <h1 class="title">Our Collection</h1>
    <p class="subtitle">Handcrafted with the finest ingredients</p>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <mat-icon class="search-icon">search</mat-icon>
      <input
        type="text"
        placeholder="Search chocolates"
        class="search-input"
        [value]="searchQuery()"
        (input)="setSearch($event)"
      />
    </div>
    <select class="sort-select" (change)="setSort($event)">
      <option value="default">Sort: Default</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="name">Name: A-Z</option>
    </select>
  </div>


  <div class="categories">
    @for (cat of categories; track cat) {
      <button
        class="catbtn"
        [class.active]="selectedCategory() === cat"
        (click)="setCategory(cat)">
        {{ cat }}
      </button>
    }
  </div>


  <p class="results-count">{{ filteredProducts().length }} products</p>

  @if (filteredProducts().length > 0) {
    <div class="grid">
      @for (product of filteredProducts(); track product.id) {
        <app-product-cards [product]="product" />
      }
    </div>
  } @else {
    <div class="empty-state">
      <mat-icon>search_off</mat-icon>
      <p>No products found</p>
    </div>
  }

</div>
