<div class="authpage">
  <div class="authcard">

    <div class="authheader">
      <a routerLink="/" class="authlogo">Bonbon Boutique</a>
      <h1 class="authtitle">Create Account</h1>
      <p class="authsubtitle">Join us for a sweeter experience</p>
    </div>

    <form class="authform" (ngSubmit)="submit()">

      @if (error()) {
        <div class="autherror">{{ error() }}</div>
      }

      <div class="formgroup">
        <label>Full Name <span class="required">*</span></label>
        <input type="text" placeholder="Your full name" [(ngModel)]="form.name" name="name" required />
      </div>

      <div class="formgroup">
        <label>Phone Number <span class="required">*</span></label>
        <input type="tel" placeholder="+20 1XX XXX XXXX" [(ngModel)]="form.phone" name="phone" required />
      </div>

      <div class="formrow">
        <div class="formgroup">
          <label>Password <span class="required">*</span></label>
          <input type="password" placeholder="Min 6 characters" [(ngModel)]="form.password" name="password" required />
        </div>
        <div class="formgroup">
          <label>Confirm Password <span class="required">*</span></label>
          <input type="password" placeholder="Repeat password" [(ngModel)]="form.confirmPassword" name="confirmPassword" required />
        </div>
      </div>

      <div class="formdivider">Delivery Address</div>

      <div class="formgroup">
        <label>Street Address <span class="required">*</span></label>
        <input type="text" placeholder="Street address" [(ngModel)]="form.address" name="address" required />
      </div>

      <div class="formrow">
        <div class="formgroup">
          <label>City <span class="required">*</span></label>
          <input type="text" placeholder="City" [(ngModel)]="form.city" name="city" required />
        </div>
        <div class="formgroup">
          <label>Apartment / Floor</label>
          <input type="text" placeholder="Optional" [(ngModel)]="form.apartment" name="apartment" />
        </div>
      </div>

      <button type="submit" class="authbtn" [disabled]="loading()">
        {{ loading() ? 'Creating account...' : 'Create Account' }}
      </button>

    </form>

    <p class="authswitch">
      Already have an account?
      <a routerLink="/login">Sign In</a>
    </p>

  </div>
</div>
